name: 同步 resource-parser.js

on:
  schedule:
    - cron: '0 */22 * * *'  # 每22小时自动同步
  workflow_dispatch:       # 可手动运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 下载并保存到 Script/resource-parser.js
        run: |
          # 源文件信息（固定）
          URL="https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js"

          # 你要保存的路径
          SAVE_PATH="Script/resource-parser.js"

          # 自动创建文件夹（防止不存在）
          mkdir -p Script

          # 容错：文件存在才下载
          if curl --output /dev/null --silent --head --fail "$URL"; then
            echo "✅ 文件正常，开始更新"
            curl -o "$SAVE_PATH" "$URL"
          else
            echo "⚠️ 文件已删除，跳过，保留本地版本"
          fi

      - name: 提交更新
        uses: EndBug/add-and-commit@v9
        with:
          message: "auto: 更新 Script/resource-parser.js"
          committer_name: GitHub Actions
          committer_email: actions@github.com
